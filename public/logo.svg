<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:1" />
    </linearGradient>
    <filter id="logo-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="4" dy="4" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="128" fill="#0F172A" />
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#logo-grad)" stroke="#3B82F6" stroke-width="4" />
  
  <g filter="url(#logo-shadow)">
    <!-- Stylized Suzuki S-Presso Silhouette (Compact SUV Shape) -->
    <!-- Main Body Lower (Blue) -->
    <path d="M140 290V340H175V320H337V340H372V290C372 275 365 270 345 270H167C147 270 140 275 140 290Z" fill="#1E40AF" />
    
    <!-- Body Upper / Cabin (White) -->
    <path d="M167 270L185 225C190 215 210 210 256 210C302 210 322 215 327 225L345 270H167Z" fill="white" />
    
    <!-- Windows (Reflective) -->
    <path d="M195 225L248 225V262H188L195 225Z" fill="#1E293B" opacity="0.9" />
    <path d="M256 225L315 225L333 262H256V225Z" fill="#1E293B" opacity="0.9" />
    
    <!-- Characteristic S-Presso Details -->
    <rect x="148" y="280" width="18" height="14" rx="3" fill="white" opacity="0.95" /> <!-- Square Headlights -->
    <rect x="175" y="280" width="162" height="6" rx="1" fill="white" opacity="0.2" /> <!-- Chrome strip line -->
    
    <!-- Wheels with High Ground Clearance -->
    <circle cx="195" cy="345" r="20" fill="#1E293B" />
    <circle cx="317" cy="345" r="20" fill="#1E293B" />
    <circle cx="195" cy="345" r="9" fill="#94A3B8" />
    <circle cx="317" cy="345" r="9" fill="#94A3B8" />
    
    <!-- Top Taxi Sign -->
    <rect x="236" y="195" width="40" height="15" rx="2" fill="#FBBF24" />
    
    <!-- Branding Text -->
    <text x="256" y="430" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-weight="900" font-size="64" style="letter-spacing: -1px;">SUPER TAXI</text>
    <text x="256" y="455" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-weight="500" font-size="14" style="letter-spacing: 4px; opacity: 0.8;">LUENA • ANGOLA</text>
  </g>
  
  <!-- Technical Accents -->
  <circle cx="256" cy="256" r="230" stroke="white" stroke-width="2" stroke-dasharray="20 15" opacity="0.1" />
  <path d="M50 256H462" stroke="white" stroke-width="1" opacity="0.05" />
  <path d="M256 50V462" stroke="white" stroke-width="1" opacity="0.05" />
</svg>
